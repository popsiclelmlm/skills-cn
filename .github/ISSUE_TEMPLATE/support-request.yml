name: Support request
description: Ask about setup, Chinese docs, workflow adoption, or customization support.
title: "[Support]: "
labels:
  - support
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reaching out. Do not include API keys, passwords, tokens, private repository data, or other secrets in this public issue.
  - type: dropdown
    id: request_type
    attributes:
      label: Request type
      options:
        - Setup or installation help
        - Chinese documentation clarification
        - Agent workflow customization
        - Paid support inquiry
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to do, and where are you stuck?
      placeholder: Describe your agent, repository type, operating system, and the skill or workflow involved.
    validations:
      required: true
  - type: textarea
    id: expected_outcome
    attributes:
      label: Expected outcome
      description: What would a successful answer or support session produce?
      placeholder: For example, a working skill setup, translated docs guidance, or a customized workflow plan.
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Contact
      description: Public GitHub handle, email, or other contact route for follow-up. Avoid secrets.
      placeholder: "@username or email@example.com"
    validations:
      required: true
  - type: input
    id: budget
    attributes:
      label: Budget
      description: Optional for free questions, required context for paid customization or support.
      placeholder: "Example: USD 20-100, or free question"
    validations:
      required: false
  - type: input
    id: timeline
    attributes:
      label: Timeline
      description: When do you need this answered or delivered?
      placeholder: "Example: this week, no hard deadline"
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance checklist
      description: How can we verify that the setup, docs answer, or customization is complete?
      placeholder: |
        - Skill installs successfully
        - Chinese docs clarify the requested workflow
        - Custom workflow is documented with exact commands
    validations:
      required: false
